# https://github.com/marketplace/actions/labeler

📦 npm:
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/**/*'
📦 lib:
  - changed-files:
      - any-glob-to-any-file: 'libs/@csnx/**/*'
🛠 workspace:
  - changed-files:
      - any-glob-to-any-file: ['tools/**/*']

# individual npm packages
'@guardian/ab-core':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/ab-core/**/*'
'@guardian/ab-react':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/ab-react/**/*'
'@guardian/browserslist-config':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/browserslist-config/**/*'
'@guardian/eslint-config':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/eslint-config/**/*'
'@guardian/eslint-config-typescript':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/eslint-config-typescript/**/*'
'@guardian/libs':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/libs/**/*'
'@guardian/consent-manager':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/consent-manager/**/*'
'@guardian/prettier':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/prettier/**/*'
'@guardian/tsconfig':
  - changed-files:
      - any-glob-to-any-file: 'libs/@guardian/tsconfig/**/*'
